<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ — โรงพยาบาลสดใส</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal-900:#0A2E2E;--teal-800:#0F3D3D;--teal-600:#1A6B6B;--teal-400:#3AA0A0;
  --teal-200:#A8D8D8;--teal-50:#EDF7F7;
  --gold:#C8973A;--gold-lt:#F5E9D4;
  --white:#FFFFFF;--cream:#FAF8F4;
  --text:#1A1714;--text2:#4A4540;--text3:#8A837A;
  --red:#C62828;--red-lt:#FFEBEE;
  --green:#1B5E20;--green-lt:#E8F5E9;
  --serif:'Noto Serif Thai',serif;--sans:'Sarabun',sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);
}
html,body{height:100%}
body{
  font-family:var(--sans);
  background:var(--teal-900);
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; padding:1rem;
  position:relative; overflow:hidden;
}

/* Background pattern */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    radial-gradient(ellipse 70% 60% at 20% 30%, rgba(58,160,160,.15) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 70%, rgba(200,151,58,.07) 0%, transparent 60%);
  pointer-events:none;
}
.bg-grid{
  position:fixed;inset:0;opacity:.04;
  background-image:
    linear-gradient(rgba(58,160,160,.6) 1px,transparent 1px),
    linear-gradient(90deg,rgba(58,160,160,.6) 1px,transparent 1px);
  background-size:48px 48px;
  pointer-events:none;
}
.deco{position:fixed;color:var(--teal-400);opacity:.06;font-size:120px;user-select:none;pointer-events:none;line-height:1}
.d1{top:8%;left:5%}
.d2{bottom:10%;right:6%;font-size:80px;opacity:.05}
.d3{top:50%;left:50%;font-size:40px;opacity:.04}

/* Card */
.card{
  width:100%;max-width:440px;
  background:var(--white);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.15);
  position:relative;z-index:1;
  animation:slideUp .6s var(--ease) both;
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(32px)}
  to{opacity:1;transform:translateY(0)}
}

/* Card header */
.card-header{
  background:var(--teal-900);
  padding:2rem 2rem 1.75rem;
  text-align:center;
  position:relative;
  border-bottom:3px solid var(--gold);
}
.card-header::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 100%, rgba(58,160,160,.2) 0%, transparent 70%);
}
.logo-wrap{
  display:inline-flex;align-items:center;justify-content:center;
  width:68px;height:68px;border-radius:50%;
  background:rgba(255,255,255,.08);
  border:2px solid rgba(58,160,160,.4);
  margin-bottom:1rem;position:relative;
  font-size:32px;
}
.logo-wrap img{width:56px;height:56px;border-radius:50%;object-fit:cover}
.card-title{
  font-family:var(--serif);font-size:20px;font-weight:700;
  color:var(--white);margin-bottom:4px;position:relative;
}
.card-sub{font-size:12px;color:rgba(255,255,255,.55);position:relative;letter-spacing:.04em}

/* Card body */
.card-body{padding:2rem}

.system-badge{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--teal-50);border:1px solid var(--teal-200);
  border-radius:10px;padding:.6rem 1rem;
  font-size:13px;color:var(--teal-600);font-weight:500;
  margin-bottom:1.75rem;
}
.system-badge-dot{width:7px;height:7px;border-radius:50%;background:var(--teal-400);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.form-group{margin-bottom:1.25rem}
label{
  display:block;font-size:13px;font-weight:600;
  color:var(--text2);margin-bottom:6px;letter-spacing:.02em;
}
.input-wrap{position:relative}
.input-icon{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  font-size:15px;color:var(--text3);pointer-events:none;
}
input[type=text],input[type=password]{
  width:100%;padding:11px 14px 11px 40px;
  border:1.5px solid #DDD8D2;border-radius:10px;
  font-family:var(--sans);font-size:14px;color:var(--text);
  background:var(--cream);outline:none;
  transition:border-color .2s,background .2s,box-shadow .2s;
}
input:focus{
  border-color:var(--teal-600);background:var(--white);
  box-shadow:0 0 0 3px rgba(26,107,107,.12);
}
.eye-btn{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  font-size:16px;color:var(--text3);padding:4px;
  transition:color .15s;
}
.eye-btn:hover{color:var(--teal-600)}

.btn-login{
  width:100%;padding:13px;
  background:var(--teal-600);color:var(--white);
  border:none;border-radius:10px;
  font-family:var(--sans);font-size:15px;font-weight:700;
  cursor:pointer;transition:all .2s var(--ease);
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:1.5rem;letter-spacing:.02em;
}
.btn-login:hover{background:var(--teal-800);transform:translateY(-1px);box-shadow:0 6px 20px rgba(10,46,46,.25)}
.btn-login:active{transform:translateY(0)}
.btn-login:disabled{opacity:.55;cursor:not-allowed;transform:none}

/* Spinner */
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Alert */
.alert{
  display:none;align-items:flex-start;gap:10px;
  padding:.75rem 1rem;border-radius:10px;
  font-size:13px;margin-bottom:1.25rem;line-height:1.5;
}
.alert.error{background:var(--red-lt);border:1px solid #FFCDD2;color:var(--red)}
.alert.success{background:var(--green-lt);border:1px solid #C8E6C9;color:var(--green)}
.alert.show{display:flex}
.alert-icon{font-size:16px;flex-shrink:0;margin-top:1px}

/* GAS URL config */
.config-section{
  border-top:1px solid #EDE9E4;margin-top:1.5rem;padding-top:1.25rem;
}
.config-toggle{
  display:flex;align-items:center;gap:6px;
  background:none;border:none;cursor:pointer;
  font-family:var(--sans);font-size:12px;color:var(--text3);
  padding:0;transition:color .15s;
}
.config-toggle:hover{color:var(--teal-600)}
.config-body{display:none;margin-top:.75rem}
.config-body.open{display:block}
.config-input-row{display:flex;gap:6px}
.config-input{
  flex:1;font-size:12px;padding:7px 10px;
  border:1px solid #DDD8D2;border-radius:8px;
  font-family:monospace;color:var(--text);background:var(--cream);
  outline:none;
}
.config-input:focus{border-color:var(--teal-600)}
.config-save{
  padding:7px 14px;background:var(--teal-600);color:#fff;
  border:none;border-radius:8px;font-size:12px;font-weight:600;
  cursor:pointer;font-family:var(--sans);transition:opacity .15s;white-space:nowrap;
}
.config-save:hover{opacity:.85}

/* Footer */
.card-footer{
  padding:.9rem 2rem;background:#F8F6F2;
  border-top:1px solid #EDE9E4;text-align:center;
}
.card-footer a{
  font-size:12px;color:var(--text3);text-decoration:none;
  transition:color .15s;
}
.card-footer a:hover{color:var(--teal-600)}

/* Role badge colors */
.role-staff{color:#1565C0}
.role-head{color:#6A1B9A}
.role-admin{color:var(--red)}
</style>
</head>
<body>

<div class="bg-grid"></div>
<span class="deco d1">✚</span>
<span class="deco d2">✚</span>
<span class="deco d3">✚</span>

<div class="card">
  <!-- Header -->
  <div class="card-header">
    <div class="logo-wrap" id="logoWrap">🏥</div>
    <div class="card-title">โรงพยาบาลสดใส</div>
    <div class="card-sub">SMART SODSAI SUPPLY · ระบบบริหารครุภัณฑ์</div>
  </div>

  <!-- Body -->
  <div class="card-body">
    <div class="system-badge">
      <span class="system-badge-dot"></span>
      เข้าสู่ระบบสำหรับเจ้าหน้าที่
    </div>

    <!-- Alert -->
    <div class="alert error" id="alertBox">
      <span class="alert-icon">⚠️</span>
      <span id="alertMsg">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</span>
    </div>

    <!-- Form -->
    <div class="form-group">
      <label for="username">ชื่อผู้ใช้ (Username)</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้" autocomplete="username">
      </div>
    </div>

    <div class="form-group">
      <label for="password">รหัสผ่าน (Password)</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="กรอกรหัสผ่าน" autocomplete="current-password">
        <button class="eye-btn" onclick="togglePwd()" type="button" id="eyeBtn" aria-label="แสดง/ซ่อนรหัสผ่าน">👁️</button>
      </div>
    </div>

    <button class="btn-login" id="btnLogin" onclick="doLogin()">
      <span id="btnText">🔓 เข้าสู่ระบบ</span>
    </button>

    <!-- GAS URL Config -->
    <div class="config-section">
      <button class="config-toggle" onclick="toggleConfig()" type="button">
        ⚙️ ตั้งค่า Apps Script URL
        <span id="configArrow">▸</span>
      </button>
      <div class="config-body" id="configBody">
        <p style="font-size:11px;color:var(--text3);margin-bottom:6px;">ใส่ URL จาก Google Apps Script (Code_login.gs)</p>
        <div class="config-input-row">
          <input type="text" class="config-input" id="gasLoginUrl" placeholder="https://script.google.com/macros/s/.../exec">
          <button class="config-save" onclick="saveGasUrl()">บันทึก</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="card-footer">
    <a href="index.html">← กลับหน้าเว็บโรงพยาบาล</a>
  </div>
</div>

<script>
// ── Load MOPH logo if saved ──
(function(){
  const saved = localStorage.getItem('gasUrl_sodsai');
  const url = localStorage.getItem('gasLoginUrl_sodsai');
  if(url) document.getElementById('gasLoginUrl').value = url;
  // Load MOPH logo
  const moph = localStorage.getItem('moph_logo');
  if(moph){
    const w = document.getElementById('logoWrap');
    w.innerHTML = `<img src="${moph}" alt="โลโก้">`;
  }
})();

// ── Config ──────────────────────────────────────────────────────
function toggleConfig(){
  const b = document.getElementById('configBody');
  const a = document.getElementById('configArrow');
  b.classList.toggle('open');
  a.textContent = b.classList.contains('open') ? '▾' : '▸';
}
function saveGasUrl(){
  const v = document.getElementById('gasLoginUrl').value.trim();
  if(!v){ alert('กรุณาใส่ URL'); return; }
  localStorage.setItem('gasLoginUrl_sodsai', v);
  showAlert('success','✅ บันทึก URL สำเร็จ');
  setTimeout(()=>hideAlert(),2000);
}

// ── Password toggle ──────────────────────────────────────────────
function togglePwd(){
  const i = document.getElementById('password');
  const b = document.getElementById('eyeBtn');
  if(i.type==='password'){ i.type='text'; b.textContent='🙈'; }
  else { i.type='password'; b.textContent='👁️'; }
}

// ── Alert helpers ────────────────────────────────────────────────
function showAlert(type, msg){
  const box = document.getElementById('alertBox');
  const txt = document.getElementById('alertMsg');
  box.className = `alert ${type} show`;
  txt.textContent = msg;
}
function hideAlert(){ document.getElementById('alertBox').classList.remove('show'); }

// ── Login ────────────────────────────────────────────────────────
async function doLogin(){
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;
  const url  = localStorage.getItem('gasLoginUrl_sodsai') ||
               document.getElementById('gasLoginUrl').value.trim();

  hideAlert();
  if(!user || !pass){ showAlert('error','กรุณากรอกชื่อผู้ใช้และรหัสผ่าน'); return; }
  if(!url){ showAlert('error','กรุณาตั้งค่า Apps Script URL ก่อน (คลิก ⚙️)'); return; }

  setLoading(true);

  try {
    const result = await jsonpFetch(url, { action:'login', username: user, password: pass });

    if(result.success){
      // บันทึก session
      const session = {
        username : result.username,
        name     : result.name,
        role     : result.role,     // staff / head / admin
        roleLabel: result.roleLabel,
        loginAt  : Date.now(),
        expires  : Date.now() + 8*60*60*1000  // 8 ชม.
      };
      sessionStorage.setItem('sodsai_session', JSON.stringify(session));
      showAlert('success', `✅ ยินดีต้อนรับ ${result.name} (${result.roleLabel})`);
      setTimeout(()=>{ window.location.href = 'sodsai-dashboard.html'; }, 1200);
    } else {
      showAlert('error', result.message || 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
    }
  } catch(e) {
    showAlert('error', 'เชื่อมต่อไม่ได้: ' + e.message);
  } finally {
    setLoading(false);
  }
}

function setLoading(on){
  const btn = document.getElementById('btnLogin');
  const txt = document.getElementById('btnText');
  btn.disabled = on;
  txt.innerHTML = on ? '<span class="spin"></span> กำลังตรวจสอบ...' : '🔓 เข้าสู่ระบบ';
}

// ── JSONP (ข้าม CORS) ────────────────────────────────────────────
function jsonpFetch(url, params){
  return new Promise((resolve, reject) => {
    const cb   = '_cb_' + Date.now();
    const s    = document.createElement('script');
    const tid  = setTimeout(()=>{ cleanup(); reject(new Error('Timeout')); }, 12000);
    function cleanup(){ clearTimeout(tid); delete window[cb]; if(s.parentNode) s.remove(); }
    window[cb] = d => { cleanup(); resolve(d); };
    s.src = url + '?' + new URLSearchParams({...params, callback:cb});
    s.onerror = ()=>{ cleanup(); reject(new Error('โหลดไม่ได้ — ตรวจสอบ URL')); };
    document.head.appendChild(s);
  });
}

// ── Enter key ────────────────────────────────────────────────────
document.addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
